<title>Constat BCP31 / AB31 – Bertin Technologies</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a1628;--bg2:#0f1f3d;--bg3:#162543;--panel:#1a2d52;--border:#2a4070;--accent:#00d4ff;--ok:#00e676;--warn:#ffab40;--danger:#ff5252;--text:#e8f4fd;--text2:#8ab4d4;--text3:#4a7090;--font-mono:'Share Tech Mono',monospace;--font-body:'Barlow',sans-serif;--font-cond:'Barlow Condensed',sans-serif;--radius:6px;--touch:48px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-tap-highlight-color:transparent}
.app{display:flex;flex-direction:column;height:100vh}

/* ═══ HEADER ═══ */
.app-header{flex-shrink:0;background:var(--bg2);border-bottom:2px solid var(--accent);padding:0 14px;display:flex;align-items:center;gap:10px;height:52px;box-shadow:0 4px 16px rgba(0,212,255,.1)}
.header-icon{width:30px;height:30px;background:var(--accent);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.header-title{flex:1;font-family:var(--font-cond);font-weight:700;font-size:.95rem;letter-spacing:.04em}
.header-title span{display:block;font-size:.55rem;font-weight:400;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}

/* ═══ BARRE ONGLETS HORIZONTALE ═══ */
.tab-bar{flex-shrink:0;display:flex;align-items:stretch;gap:0;padding:6px 8px 0;background:var(--bg2);overflow-x:auto;overflow-y:hidden;scrollbar-width:none;border-bottom:1px solid var(--border)}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:8px 12px;background:var(--bg3);border:1.5px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;transition:all .15s;position:relative;min-width:0}
.tab-item:hover{background:var(--panel)}
.tab-item.active{background:var(--panel);border-color:var(--accent)}
.tab-item.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:var(--panel)}
.tab-icon{font-size:1rem;flex-shrink:0}
.tab-label{font-family:var(--font-mono);font-size:.62rem;font-weight:700;color:var(--text3);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.tab-item.active .tab-label{color:var(--accent)}
.tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tab-dot.ok{background:var(--ok);box-shadow:0 0 5px var(--ok)}
.tab-dot.nc{background:var(--danger);box-shadow:0 0 5px var(--danger)}
.tab-dot.partial{background:var(--warn)}
.tab-dot.wait{background:var(--text3)}
.tab-close{font-size:.65rem;color:var(--text3);margin-left:3px;cursor:pointer;padding:2px;border-radius:3px;flex-shrink:0}
.tab-close:hover{color:var(--danger);background:rgba(255,82,82,.15)}
.tab-scan{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 10px;background:rgba(0,212,255,.06);border:1.5px solid var(--accent);border-bottom:none;border-radius:8px 8px 0 0;color:var(--accent);font-family:var(--font-mono);font-size:.65rem;font-weight:700;cursor:pointer}
.tab-scan:hover{background:rgba(0,212,255,.12)}
.tab-add{flex-shrink:0;display:flex;align-items:center;justify-content:center;width:34px;padding:8px 0;background:rgba(0,230,118,.06);border:1.5px solid var(--ok);border-bottom:none;border-radius:8px 8px 0 0;color:var(--ok);font-size:1rem;font-weight:700;cursor:pointer}
.tab-add:hover{background:rgba(0,230,118,.12)}

/* ═══ SOUS-ONGLETS (dans un constat) ═══ */
.sub-tabs{display:flex;gap:0;padding:6px 10px 0;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:10;background:var(--bg)}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{flex-shrink:0;padding:7px 14px;font-family:var(--font-cond);font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.sub-tab:hover{color:var(--text2)}
.sub-tab.active{color:var(--accent);border-color:var(--accent)}
.sub-panel{display:none;padding:12px}
.sub-panel.active{display:block}

/* ═══ CONTENU ═══ */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 90px;-webkit-overflow-scrolling:touch}
.panel{display:none}
.panel.active{display:block}

/* ═══ SECTIONS ═══ */
.section{margin:0 12px 12px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.section-title{display:flex;align-items:center;gap:10px;background:var(--bg3);padding:10px 14px;font-family:var(--font-cond);font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);border-bottom:1px solid var(--border)}
.section-title .num{background:var(--accent);color:var(--bg);font-family:var(--font-mono);font-size:.6rem;padding:1px 6px;border-radius:3px}
.section-body{padding:14px;display:flex;flex-direction:column;gap:10px}

/* ═══ CHAMPS ═══ */
.field-group{display:flex;flex-direction:column;gap:5px}
.field-label{font-family:var(--font-cond);font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2)}
.field-label .tol{font-weight:400;color:var(--warn);margin-left:6px;font-size:.65rem;font-family:var(--font-mono)}
input[type="text"],input[type="date"],textarea,select{width:100%;min-height:var(--touch);background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-mono);font-size:.9rem;padding:10px 14px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.15)}
textarea{min-height:100px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input.mesure{font-size:1.1rem;font-family:var(--font-mono);color:var(--accent);text-align:center}

/* ═══ CHECKS ═══ */
.checks-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.check-item{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;min-height:44px;user-select:none;transition:all .15s}
.check-item.checked{border-color:var(--accent);background:rgba(0,212,255,.08)}
.check-item input{display:none}
.check-box{width:20px;height:20px;flex-shrink:0;border:2px solid var(--border);border-radius:4px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.check-item.checked .check-box{border-color:var(--accent);background:var(--accent);color:var(--bg)}
.check-label{font-size:.8rem}

/* ═══ C/NC ═══ */
.cnc-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cnc-group{display:flex;flex-direction:column;gap:4px}
.cnc-sub{font-family:var(--font-cond);font-size:.6rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.radio-group{display:flex;gap:6px}
.radio-btn{flex:1;min-height:40px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);font-family:var(--font-cond);font-weight:700;font-size:.85rem;cursor:pointer;transition:all .15s;user-select:none}
.radio-btn.c-sel{border-color:var(--ok);background:rgba(0,230,118,.12);color:var(--ok)}
.radio-btn.nc-sel{border-color:var(--danger);background:rgba(255,82,82,.12);color:var(--danger)}

/* ═══ JUGEMENT ═══ */
.jug-grid{display:flex;flex-direction:column;gap:8px}
.jug-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;min-height:var(--touch);user-select:none;transition:all .15s}
.jug-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .15s}
.jug-text{font-size:.85rem}
.jug-item.sel-ok{border-color:var(--ok)}.jug-item.sel-ok .jug-dot{background:var(--ok);border-color:var(--ok)}.jug-item.sel-ok .jug-text{color:var(--ok)}
.jug-item.sel-warn{border-color:var(--warn)}.jug-item.sel-warn .jug-dot{background:var(--warn);border-color:var(--warn)}.jug-item.sel-warn .jug-text{color:var(--warn)}
.jug-item.sel-bad{border-color:var(--danger)}.jug-item.sel-bad .jug-dot{background:var(--danger);border-color:var(--danger)}.jug-item.sel-bad .jug-text{color:var(--danger)}

/* ═══ INFOBOX ═══ */
.info-box{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:var(--radius);padding:8px 12px;font-size:.78rem;color:var(--text2);line-height:1.4;font-family:var(--font-mono)}
.info-box strong{color:var(--accent)}

/* ═══ ETALON ═══ */
.etalon-list{max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:var(--bg2)}
.etalon-item{padding:8px 10px;cursor:pointer;font-size:.78rem;border-bottom:1px solid rgba(42,64,112,.4);color:var(--text2)}
.etalon-item:hover{background:rgba(0,212,255,.08);color:var(--text)}
.etalon-item.selected{background:rgba(0,212,255,.12);color:var(--accent)}

/* ═══ FAB ═══ */
.fab-zone{position:fixed;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,var(--bg) 30%);display:flex;gap:8px;z-index:20;pointer-events:none}
.fab-zone>*{pointer-events:all}
.btn-gen{flex:1;height:48px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-family:var(--font-cond);font-size:.95rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(0,212,255,.3)}
.btn-gen:disabled{background:var(--text3);box-shadow:none;cursor:not-allowed}

/* ═══ TOAST / SCAN ═══ */
.toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:.82rem;padding:10px 18px;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.scan-overlay{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.95);flex-direction:column;align-items:center;justify-content:center}
.scan-overlay.open{display:flex}
.scan-overlay video{width:85%;max-width:400px;border-radius:12px;border:2px solid var(--accent)}
.scan-close{position:absolute;top:14px;right:14px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:1.2rem;cursor:pointer}
.scan-hint{color:var(--accent);font-family:var(--font-mono);font-size:.75rem;margin-top:10px}

/* ═══ CONFIG section scan button ═══ */
.btn-cfg-scan{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:52px;background:rgba(0,212,255,.08);border:2px dashed var(--accent);border-radius:var(--radius);color:var(--accent);font-family:var(--font-cond);font-size:.9rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.btn-cfg-scan:hover{background:rgba(0,212,255,.15)}

@media(max-width:400px){.grid2{grid-template-columns:1fr}.checks-grid{grid-template-columns:1fr}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

// ═══ BARRE ONGLETS ═══
function renderTabBar(){
  let h=`<div class="tab-item${activeTab==='config'?' active':''}" onclick="switchTab('config')"><span class="tab-icon">⚙</span><span class="tab-label">CONFIG</span></div>`;
  Object.keys(sessions).forEach(id=>{
    const s=sessions[id],st=getStatus(s),lbl=s.label||'Nouveau';
    h+=`<div class="tab-item${activeTab===id?' active':''}" onclick="switchTab('${id}')"><span class="tab-icon">☢</span><span class="tab-label">${esc(lbl)}</span><span class="tab-dot ${st}"></span><span class="tab-close" onclick="event.stopPropagation();closeConstat('${id}')">✕</span></div>`;
  });
  h+=`<div class="tab-scan" onclick="openScan('__new__')">📷 Scan</div>`;
  h+=`<div class="tab-add" onclick="addConstat()">＋</div>`;
  $('tabBar').innerHTML=h;
}
function getStatus(s){
  if(s.jugement==='c'||s.jugement==='ci')return'ok';
  if(s.jugement==='nc')return'nc';
  return Object.values(s.fields||{}).some(v=>v&&v.trim())?'partial':'wait';
}

// ═══ RENDU CONTENU ═══
function renderContent(){
  if(activeTab==='config'){$('mainContent').innerHTML=renderConfig();bindConfig();}
  else{$('mainContent').innerHTML=renderConstat(activeTab);bindConstat(activeTab);showSub(sessions[activeTab]?.subTab||0);}
  $('btnGen').disabled=!sourcePdfBytes||activeTab==='config';
}

function bindConfig(){
  document.querySelectorAll('[data-cfg]').forEach(el=>{
    const k=el.dataset.cfg; if(config[k])el.value=config[k];
    el.addEventListener('input',()=>{config[k]=el.value;persistAll();});
  });
  renderEtalonPicker();
}

// ── CONSTAT ──
function renderConstat(id){
  const s=sessions[id]; if(!s)return'';
  let h='<div class="panel active"><div class="sub-tabs" id="subTabs">';
  SUB_TABS.forEach((t,i)=>h+=`<div class="sub-tab${i===0?' active':''}" onclick="showSub(${i})">${esc(t)}</div>`);
  h+='</div>';
  // Sub-panels
  h+=subIdentif(id)+subEtat(id)+subEquip(id)+subControles(id)+subMesures(id)+subFinal(id);
  h+='</div>';
  return h;
}
function showSub(i){
  if(activeTab!=='config'&&sessions[activeTab])sessions[activeTab].subTab=i;
  document.querySelectorAll('.sub-tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.sub-panel').forEach((p,j)=>p.classList.toggle('active',j===i));
}

// ═══ INTERACTIONS ═══
function tgChk(id){const el=$(id),lbl=$('lbl_'+id);if(!el||!lbl)return;el.checked=!el.checked;lbl.classList.toggle('checked',el.checked);autoSave();}
const cncVals={};
function setCNC(f,v,btn){cncVals[f]=v;btn.parentElement.querySelectorAll('.radio-btn').forEach(b=>b.className='radio-btn');btn.className='radio-btn '+(v==='C'?'c-sel':'nc-sel');autoSave();}
function selJug(v){if(activeTab==='config'||!sessions[activeTab])return;sessions[activeTab].jugement=v;
  ['c','ci','nc'].forEach(k=>{const e=$('jug_'+k);if(e)e.className='jug-item';});
  const m={c:'sel-ok',ci:'sel-warn',nc:'sel-bad'};const e=$('jug_'+v);if(e)e.className='jug-item '+m[v];
  autoSave();renderTabBar();}
function calcMoy(){const a=parseFloat(String($('td1')?.value||'').replace(',','.')),b=parseFloat(String($('td2')?.value||'').replace(',','.'));const el=$('tmoy');if(el&&!isNaN(a)&&!isNaN(b))el.value=((a+b)/2).toFixed(1);}
function chkTol(el,min,max,id){const v=parseFloat(String(el.value).replace(',','.'));const b=$(id+'_info');if(!b)return;if(isNaN(v)||el.value===''){b.style.display='none';return;}const ok=v>=min&&v<=max;b.style.display='block';b.style.background=ok?'rgba(0,230,118,.08)':'rgba(255,82,82,.08)';b.style.borderColor=ok?'rgba(0,230,118,.3)':'rgba(255,82,82,.3)';b.style.color=ok?'#00e676':'#ff5252';b.innerHTML=ok?`✅ <strong>${v}</strong> — OK [${min}–${max}]`:`⚠️ <strong>${v}</strong> — HORS TOL [${min}–${max}]`;}

// ═══ MULTI-CONSTAT ═══
function addConstat(label){cnt++;const id='c'+Date.now()+'_'+cnt;sessions[id]={fields:{},cnc:{},checks:{},jugement:null,label:label||'Nouveau',subTab:0};switchTab(id);showToast('✅ Constat ajouté');return id;}
function switchTab(id){if(activeTab!=='config'&&sessions[activeTab])saveToSession();activeTab=id;renderTabBar();renderContent();persistAll();}
function closeConstat(id){if(confirm('Fermer "'+sessions[id]?.label+'" ?')){delete sessions[id];if(activeTab===id){const k=Object.keys(sessions);activeTab=k.length?k[k.length-1]:'config';}renderTabBar();renderContent();persistAll();showToast('Constat fermé');}}

// ═══ SESSION SYNC ═══
function saveToSession(){if(activeTab==='config'||!sessions[activeTab])return;const s=sessions[activeTab];
  document.querySelectorAll('[data-f]').forEach(el=>s.fields[el.dataset.f]=el.value);
  document.querySelectorAll('[data-chk]').forEach(el=>s.checks[el.dataset.chk]=el.checked);
  s.cnc=Object.assign({},cncVals);
  const ic=s.fields.identif_client||s.fields.num_serie||'';if(ic)s.label=ic;}
function bindConstat(id){const s=sessions[id];if(!s)return;
  document.querySelectorAll('[data-f]').forEach(el=>{el.value=s.fields[el.dataset.f]||el.defaultValue||'';el.addEventListener('input',()=>autoSave());});
  document.querySelectorAll('[data-chk]').forEach(el=>{const c=!!s.checks[el.dataset.chk];el.checked=c;$('lbl_'+el.dataset.chk)?.classList.toggle('checked',c);});
  Object.keys(cncVals).forEach(k=>delete cncVals[k]);
  if(s.cnc){Object.assign(cncVals,s.cnc);Object.keys(s.cnc).forEach(k=>{const v=s.cnc[k],rg=$('rg_'+k);if(rg)rg.querySelectorAll('.radio-btn').forEach(b=>{b.className='radio-btn';if(b.textContent.trim()===v)b.className='radio-btn '+(v==='C'?'c-sel':'nc-sel');});});}
  if(s.jugement){const m={c:'sel-ok',ci:'sel-warn',nc:'sel-bad'};const e=$('jug_'+s.jugement);if(e)e.className='jug-item '+m[s.jugement];}}
function autoSave(){if(activeTab!=='config'&&sessions[activeTab])saveToSession();persistAll();renderTabBar();}

// ═══ PERSISTENCE ═══
function persistAll(){try{localStorage.setItem('bcp31_s',JSON.stringify({sessions,cnt}));localStorage.setItem('bcp31_c',JSON.stringify(config));}catch(e){}}
function restoreAll(){try{const r=localStorage.getItem('bcp31_s');if(r){const d=JSON.parse(r);sessions=d.sessions||{};cnt=d.cnt||0;}const c=localStorage.getItem('bcp31_c');if(c)config=JSON.parse(c);}catch(e){}}

// ═══ SCANNER ═══
let scanStream=null,scanTarget=null;
function openScan(target){scanTarget=target;$('scanOverlay').classList.add('open');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(s=>{scanStream=s;const v=$('scanVideo');v.srcObject=s;
    if('BarcodeDetector' in window){const det=new BarcodeDetector({formats:['qr_code','code_128','code_39','ean_13','ean_8']});
      const loop=()=>{if(!scanStream)return;det.detect(v).then(bc=>{if(bc.length){closeScan();onScanResult(bc[0].rawValue);return;}requestAnimationFrame(loop);}).catch(()=>requestAnimationFrame(loop));};
      v.onloadedmetadata=()=>requestAnimationFrame(loop);}
  }).catch(e=>{closeScan();showToast('❌ Caméra: '+e.message);});}
function closeScan(){$('scanOverlay').classList.remove('open');if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}}
function onScanResult(val){
  showToast('✅ Scanné: '+val);
  if(scanTarget==='__new__'){
    // Chercher dans la base matériel
    const mat=findMateriel(val);
    const id=addConstat(val);
    if(mat){
      const s=sessions[id];
      s.fields.identif_client=val;
      s.fields.num_serie=mat.num_serie||mat.SN||mat['S/N']||'';
      s.label=val;
      const desig=(mat.designation||mat.DESIGNATION||'').toUpperCase();
      if(desig.includes('AB31'))s.checks.ab31=true;
      if(desig.includes('BCP31'))s.checks.bcp31=true;
      renderContent();
    }
  }else{
    const el=$(scanTarget);if(el){el.value=val;el.dispatchEvent(new Event('input'));}
  }
}
function findMateriel(id){
  try{for(const k of['rpm_materiels','materiels_db','listing_data']){
    const raw=localStorage.getItem(k);if(!raw)continue;const data=JSON.parse(raw),arr=Array.isArray(data)?data:(data.items||data.materiels||[]);
    const f=arr.find(m=>(m.identif_client||m.ID||m.SCAN||'').toUpperCase()===id.toUpperCase()||(m.num_serie||m.SN||m['S/N']||'').toUpperCase()===id.toUpperCase());
    if(f)return f;}}catch(e){}return null;}
function lookupMat(val){
  if(!val||val.length<3){const r=$('lookupResult');if(r)r.style.display='none';return;}
  const f=findMateriel(val);const b=$('lookupResult');if(!b)return;
  if(f){b.style.display='block';b.style.borderColor='rgba(0,230,118,.3)';b.style.color='#00e676';
    b.innerHTML=`✅ <strong>Trouvé</strong> : ${f.designation||f.DESIGNATION||'—'} · S/N: ${f.num_serie||f.SN||f['S/N']||'—'}`;
    const ns=$('num_serie');if(ns&&(f.num_serie||f.SN))ns.value=f.num_serie||f.SN||f['S/N']||'';
    const d=(f.designation||f.DESIGNATION||'').toUpperCase();
    if(d.includes('AB31')){const c=$('ab31');if(c){c.checked=true;$('lbl_ab31')?.classList.add('checked');}}
    if(d.includes('BCP31')){const c=$('bcp31');if(c){c.checked=true;$('lbl_bcp31')?.classList.add('checked');}}
    autoSave();
  }else{b.style.display='block';b.style.borderColor='rgba(255,171,64,.3)';b.style.color='#ffab40';b.innerHTML='ℹ Non trouvé — saisie manuelle';}
}

// ═══ ÉTALONS ═══
function renderEtalonPicker(){const c=$('etalonPicker');if(!c)return;let et=[];
  try{for(const k of['etalons_db','rpm_etalons','etalons']){const raw=localStorage.getItem(k);if(!raw)continue;const data=JSON.parse(raw),arr=Array.isArray(data)?data:(data.items||data.etalons||[]);
    et=arr.filter(e=>{const d=(e.designation||e.DESIGNATION||e.type||e.radioElement||'').toUpperCase();return d.includes('CO')||d.includes('60')||d.includes('COBALT');});if(et.length)break;}}catch(e){}
  if(!et.length){c.innerHTML='<div class="info-box" style="color:var(--text3)">Aucun étalon ⁶⁰Co en base — saisie manuelle</div>';return;}
  let h='<div class="etalon-list">';et.forEach((e,i)=>{const n=e.numero||e.ID||e.id||e.num||'?';const a=e.activite||e.activite_bq||e.ACTIVITE||'?';
    h+=`<div class="etalon-item" onclick="selEt(${i})" id="et_${i}"><strong style="color:var(--accent)">#${n}</strong> · ${a} Bq</div>`;});
  h+='</div>';c.innerHTML=h;c._et=et;}
function selEt(i){const c=$('etalonPicker');if(!c||!c._et)return;const e=c._et[i];if(!e)return;
  c.querySelectorAll('.etalon-item').forEach(el=>el.classList.remove('selected'));$('et_'+i)?.classList.add('selected');
  const sn=$('cfg_src_num'),ab=$('cfg_src_act');

  if(ab){ab.value=e.activite||e.activite_bq||e.ACTIVITE||'';config.cfg_src_act=ab.value;}
  persistAll();showToast('✅ Étalon #'+(e.numero||e.ID||''));}

// ═══ PDF GÉNÉRATION ═══
async function generatePDF(){
  if(!sourcePdfBytes){showToast('⚠️ PDF non chargé');return;}
  if(activeTab==='config'){showToast('Sélectionnez un constat');return;}
  saveToSession();const s=sessions[activeTab];if(!s)return;
  const btn=$('btnGen');btn.disabled=true;btn.textContent='⏳ Génération…';
  try{
    const f=s.fields,c=s.cnc||{},chk=s.checks||{},cfg=config;
    const{PDFDocument}=PDFLib;
    const pdfDoc=await PDFDocument.load(sourcePdfBytes,{ignoreEncryption:true});
    const form=pdfDoc.getForm();
    const sT=(n,v)=>{try{form.getTextField(n).setText(v||'');}catch(e){}};
    const sC=(n,v)=>{try{v?form.getCheckBox(n).check():form.getCheckBox(n).uncheck();}catch(e){}};
    const dv=(cfg.cfg_date||'').split('-').reverse().join('/');

    sT('Texte1',cfg.cfg_num||f.identif_client||'');sT('Texte2',cfg.cfg_site||'');sT('Texte3',dv);
